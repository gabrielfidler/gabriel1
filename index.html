<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS 2D COMPLEXO - Onda Infinita</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; color:#0f0; }
    canvas { display:block; }
    #ui {
      position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:12px; border-radius:8px; pointer-events:none;
      font-size:18px;
    }
    #crosshair {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:40px; color:lime; opacity:0.8; pointer-events:none; user-select:none;
    }
    #wave { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); padding:10px 20px; border-radius:8px; font-size:24px; }
    #gameover {
      position:absolute; inset:0; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; color:white; font-size:48px;
    }
  </style>
</head>
<body>

<div id="ui">
  Vida: <span id="health">100</span> | 
  Pontos: <span id="score">0</span> | 
  Onda: <span id="waveNum">1</span> | 
  Munição: <span id="ammo">30</span>/30
</div>
<div id="wave">ONDA <span id="waveBig">1</span></div>
<div id="crosshair">+</div>

<div id="gameover">
  <h1>GAME OVER</h1>
  <p>Pontuação final: <span id="finalScore">0</span></p>
  <button onclick="location.reload()" style="font-size:24px;padding:15px 30px;margin-top:20px;cursor:pointer;">JOGAR NOVAMENTE</button>
</div>

<canvas id="c"></canvas>

<script>
// ==================== CONFIGURAÇÃO ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ==================== JOGADOR ====================
const player = {
  x: W/2, y: H/2,
  radius: 18,
  speed: 4.5,
  health: 100,
  score: 0,
  ammo: 30,
  maxAmmo: 30,
  reloadTime: 0,
  color: '#0af'
};

// ==================== CONTROLES ====================
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key==='r' || e.key==='R') reload(); });
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

let mouse = {x: W/2, y: H/2, down: false};
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup',   () => mouse.down = false);

// ==================== PAREDES (obstáculos) ====================
const walls = [
  {x:200, y:150, w:400, h:30},   // horizontal
  {x:700, y:300, w:30, h:400},
  {x:100, y:500, w:500, h:30},
  {x:900, y:100, w:30, h:300},
  {x:400, y:700, w:600, h:30},
  {x:1200, y:400, w:30, h:400}
];

// ==================== PROJÉTEIS ====================
const bullets = [];

// ==================== BOTS (3 tipos) ====================
const bots = [];
let wave = 1;
let botsToSpawn = 0;
let waveTimer = 0;

function spawnBot(type) {
  const side = Math.random()*4|0;
  let x,y;
  if(side===0){ x=Math.random()*W; y=-40; }
  else if(side===1){ x=W+40; y=Math.random()*H; }
  else if(side===2){ x=Math.random()*W; y=H+40; }
  else { x=-40; y=Math.random()*H; }

  const speed = type==='fast' ? 3.2 : type==='tank' ? 1.1 : 2.0;
  const health = type==='tank' ? 8 : type==='fast' ? 2 : 4;
  const color = type==='fast' ? '#0f0' : type==='tank' ? '#44f' : '#f44';

  bots.push({
    x, y, radius: 17,
    speed, health, maxHealth: health,
    type, color,
    shootCooldown: 0,
    lastShot: 0
  });
}

// ==================== POWER-UPS ====================
const powerups = [];

function spawnPowerUp() {
  if(Math.random()<0.3) return;
  const types = ['health','speed'];
  const pu = {
    x: 50 + Math.random()*(W-100),
    y: 50 + Math.random()*(H-100),
    type: types[Math.random()*2|0],
    radius: 14,
    life: 600
  };
  powerups.push(pu);
}

// ==================== PARTÍCULAS (explosões) ====================
const particles = [];

function createExplosion(x, y, count, color) {
  for(let i=0; i<count; i++) {
    const angle = Math.random()*Math.PI*2;
    const vel = 2 + Math.random()*6;
    particles.push({
      x, y,
      vx: Math.cos(angle)*vel,
      vy: Math.sin(angle)*vel,
      life: 30 + Math.random()*25,
      size: 4 + Math.random()*5,
      color
    });
  }
}

// ==================== FUNÇÕES AUXILIARES ====================
function collideRectCircle(rx, ry, rw, rh, cx, cy, cr) {
  const testX = Math.max(rx, Math.min(cx, rx+rw));
  const testY = Math.max(ry, Math.min(cy, ry+rh));
  return Math.hypot(testX-cx, testY-cy) < cr;
}

function reload() {
  if(player.ammo < player.maxAmmo && player.reloadTime <= 0) {
    player.reloadTime = 90; // ~1.5s
  }
}

// ==================== LOOP PRINCIPAL ====================
let lastTime = 0;
function gameLoop(time) {
  if(!lastTime) lastTime = time;
  const dt = Math.min((time - lastTime)/16, 3);
  lastTime = time;

  // Fundo
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // === MOVIMENTO JOGADOR ===
  let dx=0, dy=0;
  if(keys['w']||keys['arrowup']) dy--;
  if(keys['s']||keys['arrowdown']) dy++;
  if(keys['a']||keys['arrowleft']) dx--;
  if(keys['d']||keys['arrowright']) dx++;

  if(dx||dy){
    const len = Math.hypot(dx,dy);
    dx/=len; dy/=len;
    let nx = player.x + dx * player.speed * dt;
    let ny = player.y + dy * player.speed * dt;

    // colisão paredes
    let canMove = true;
    for(const wall of walls){
      if(collideRectCircle(wall.x, wall.y, wall.w, wall.h, nx, ny, player.radius)){
        canMove = false; break;
      }
    }
    if(canMove){
      player.x = nx;
      player.y = ny;
    }
  }

  // Limites tela
  player.x = Math.max(player.radius, Math.min(W-player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(H-player.radius, player.y));

  // === RECARGA ===
  if(player.reloadTime > 0){
    player.reloadTime -= dt;
    if(player.reloadTime <= 0) player.ammo = player.maxAmmo;
  }

  // === ATIRAR ===
  if(mouse.down && player.ammo > 0 && (!player.lastShot || time - player.lastShot > 120)){
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    const spread = (Math.random()-0.5)*0.2; // leve spread
    bullets.push({
      x: player.x,
      y: player.y,
      vx: Math.cos(angle+spread)*13,
      vy: Math.sin(angle+spread)*13,
      life: 70,
      color: '#ff0',
      owner: 'player'
    });
    player.ammo--;
    player.lastShot = time;
    createExplosion(player.x, player.y, 3, '#ff0'); // muzzle flash
  }

  // === ATUALIZA BALAS ===
  for(let i=bullets.length-1; i>=0; i--){
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // colisão paredes
    let hitWall = false;
    for(const wall of walls){
      if(collideRectCircle(wall.x, wall.y, wall.w, wall.h, b.x, b.y, 6)){
        hitWall = true; break;
      }
    }
    if(hitWall || b.life<=0 || b.x<0||b.x>W||b.y<0||b.y>H){
      bullets.splice(i,1); continue;
    }

    // desenha bala
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();

    // colisão com bots
    if(b.owner==='player'){
      for(let j=bots.length-1; j>=0; j--){
        const bot = bots[j];
        if(Math.hypot(b.x-bot.x, b.y-bot.y) < 22){
          bot.health--;
          bullets.splice(i,1);
          createExplosion(b.x, b.y, 8, '#ff0');
          if(bot.health <= 0){
            createExplosion(bot.x, bot.y, 25, bot.color);
            player.score += bot.type==='tank' ? 50 : bot.type==='fast' ? 20 : 15;
            bots.splice(j,1);
          }
          break;
        }
      }
    }
  }

  // === BOTS ===
  for(let i=bots.length-1; i>=0; i--){
    const bot = bots[i];

    // IA: persegue jogador (evitando paredes simples)
    const angle = Math.atan2(player.y - bot.y, player.x - bot.x);
    let nx = bot.x + Math.cos(angle) * bot.speed * dt;
    let ny = bot.y + Math.sin(angle) * bot.speed * dt;

    let blocked = false;
    for(const wall of walls){
      if(collideRectCircle(wall.x, wall.y, wall.w, wall.h, nx, ny, bot.radius)){
        blocked = true; break;
      }
    }
    if(!blocked){
      bot.x = nx;
      bot.y = ny;
    }

    // Atira
    bot.shootCooldown += dt;
    if(bot.shootCooldown > 70 && Math.hypot(player.x-bot.x, player.y-bot.y) < 420){
      const bAngle = Math.atan2(player.y-bot.y, player.x-bot.x);
      bullets.push({
        x: bot.x, y: bot.y,
        vx: Math.cos(bAngle)*8,
        vy: Math.sin(bAngle)*8,
        life: 90,
        color: '#f66',
        owner: 'bot'
      });
      bot.shootCooldown = Math.random()*20 - 10;
    }

    // Desenha bot + barra de vida
    ctx.fillStyle = bot.color;
    ctx.beginPath();
    ctx.arc(bot.x, bot.y, bot.radius, 0, Math.PI*2);
    ctx.fill();

    // barra vida
    const barW = bot.radius*2.2;
    ctx.fillStyle = '#000';
    ctx.fillRect(bot.x-barW/2, bot.y-bot.radius-12, barW, 6);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(bot.x-barW/2, bot.y-bot.radius-12, barW*(bot.health/bot.maxHealth), 6);

    // colisão com jogador
    if(Math.hypot(player.x-bot.x, player.y-bot.y) < player.radius + bot.radius){
      player.health -= 0.6 * dt;
    }
  }

  // === POWER-UPS ===
  for(let i=powerups.length-1; i>=0; i--){
    const p = powerups[i];
    p.life -= dt;

    ctx.fillStyle = p.type==='health' ? '#f33' : '#ff0';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fill();

    if(Math.hypot(player.x-p.x, player.y-p.y) < player.radius + p.radius + 8){
      if(p.type==='health') player.health = Math.min(100, player.health+35);
      else player.speed = 6.5; setTimeout(()=>{player.speed=4.5;}, 6000);
      powerups.splice(i,1);
      createExplosion(p.x, p.y, 12, p.type==='health'?'#f00':'#ff0');
    }
    if(p.life<=0) powerups.splice(i,1);
  }

  // === PARTÍCULAS ===
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.vx *= 0.96;
    p.vy *= 0.96;

    ctx.globalAlpha = p.life/40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
    if(p.life<=0) particles.splice(i,1);
  }
  ctx.globalAlpha = 1;

  // === DESENHA PAREDES ===
  ctx.fillStyle = '#555';
  for(const wall of walls){
    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
  }

  // === DESENHA JOGADOR ===
  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
  ctx.fill();

  // mira extra no canvas
  ctx.strokeStyle = 'lime';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(mouse.x-16, mouse.y);
  ctx.lineTo(mouse.x+16, mouse.y);
  ctx.moveTo(mouse.x, mouse.y-16);
  ctx.lineTo(mouse.x, mouse.y+16);
  ctx.stroke();

  // === ONDAS ===
  waveTimer += dt;
  if((bots.length === 0 && waveTimer > 60) || waveTimer > 1200){
    wave++;
    botsToSpawn = 3 + wave*6;
    document.getElementById('waveNum').textContent = wave;
    document.getElementById('waveBig').textContent = wave;

    for(let i=0; i<botsToSpawn; i++){
      const type = i%4===0 ? 'tank' : i%3===0 ? 'fast' : 'normal';
      setTimeout(()=>spawnBot(type), i*80);
    }
    waveTimer = 0;
    if(Math.random()<0.6) spawnPowerUp();
  }

  // HUD
  document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
  document.getElementById('score').textContent = player.score;
  document.getElementById('ammo').textContent = player.ammo;

  // GAME OVER
  if(player.health <= 0){
    document.getElementById('gameover').style.display = 'flex';
    document.getElementById('finalScore').textContent = player.score;
    return;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
